<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veil - 登录</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="preconnect" href="https://unpkg.com">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#F2F2F7">
    <meta name="color-scheme" content="light dark">
    <script type="module" src="/js/theme.js"></script>
</head>
<body>
    <canvas id="aurora-canvas"></canvas>

    <div class="scene" id="loginScene" style="opacity: 0; transition: opacity 0.3s ease;">
        <div id="loginCard" class="card-3d" style="width:100%; max-width:360px; padding:40px; border-radius:40px; display:flex; flex-direction:column; align-items:center;">

            <div class="layer-3" style="display:flex; flex-direction:column; align-items:center; margin-bottom:32px;">
                <div class="logo-container" style="width:84px; height:84px; border-radius:24px; display:flex; align-items:center; justify-content:center; margin-bottom:20px;">
                    <i class="ph ph-envelope-simple login-logo-icon" style="font-size:40px; display:flex; align-items:center; justify-content:center; width:100%; height:100%;"></i>
                </div>
                <h1 class="login-title" style="font-size:24px; font-weight:600; letter-spacing:-0.02em;">Veil</h1>
                <p class="login-subtitle" style="font-size:14px; margin-top:4px;">临时邮箱服务</p>
            </div>

            <form id="loginForm" class="layer-2" style="display:flex; flex-direction:column; gap:24px; width:100%;">
                <div>
                    <div class="login-field-label" style="display:flex; align-items:center; gap:8px; padding-left:4px; margin-bottom:8px;">
                        <i class="ph ph-user" style="font-size:16px;"></i>
                        <span style="font-size:14px; font-weight:500; letter-spacing:0.02em;">用户名</span>
                    </div>
                    <input type="text" id="loginUsername" placeholder="请输入用户名"
                           class="apple-input" style="width:100%; height:50px; padding:0 16px; border-radius:16px; font-size:15px; outline:none;"
                           autocomplete="username" required>
                </div>

                <div>
                    <div class="login-field-label" style="display:flex; align-items:center; gap:8px; padding-left:4px; margin-bottom:8px;">
                        <i class="ph ph-lock" style="font-size:16px;"></i>
                        <span style="font-size:14px; font-weight:500; letter-spacing:0.02em;">密码</span>
                    </div>
                    <input type="password" id="loginPassword" placeholder="请输入密码"
                           class="apple-input" style="width:100%; height:50px; padding:0 16px; border-radius:16px; font-size:15px; outline:none;"
                           autocomplete="current-password" required>
                </div>

                <div id="errorMsg" class="error-text hidden"></div>

                <div class="layer-3" style="margin-top:8px; width:100%;">
                    <button type="submit" id="loginBtn"
                            class="apple-btn" style="width:100%; height:50px; color:white; font-weight:500; border-radius:16px; display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer;">
                        <span>登录</span>
                        <i class="ph ph-arrow-right" style="font-size:16px; opacity:0.8;"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="toast" id="toast">
        <i class="ph-bold ph-check"></i>
        <span id="toastMsg">成功</span>
    </div>

    <script type="module">
        import { startAurora, stopAurora, initCard3D } from '/js/aurora.js';
        import { login, checkSession, getRedirectUrl } from '/js/auth.js';
        import { showToast } from '/js/common.js';
        import { initTheme } from '/js/theme.js';

        initTheme();

        // 初始化背景动画和3D卡片
        startAurora();
        initCard3D('loginCard');

        const loginScene = document.getElementById('loginScene');

        // 检查是否已登录
        async function checkAuth() {
            try {
                const user = await checkSession();
                if (user) {
                    // 已登录，直接跳转，不显示登录表单
                    window.location.href = getRedirectUrl(user);
                    return;
                }
            } catch (e) {
                console.error('Auth check failed:', e);
            }
            // 未登录，显示登录表单
            loginScene.style.opacity = '1';
        }
        checkAuth();

        // 登录表单处理
        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('loginUsername');
        const passwordInput = document.getElementById('loginPassword');
        const errorMsg = document.getElementById('errorMsg');
        const loginBtn = document.getElementById('loginBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (loginBtn.disabled) return;

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            if (!username || !password) {
                showError('请输入用户名和密码');
                return;
            }

            // 禁用按钮，显示加载状态
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="ph ph-spinner spinning"></i> <span>登录中...</span>';

            const result = await login(username, password);

            if (result.success) {
                showToast('登录成功');
                stopAurora();
                // 跳转到对应页面
                setTimeout(() => {
                    window.location.href = getRedirectUrl(result.user);
                }, 500);
            } else {
                showError(result.error);
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<span>登录</span><i class="ph ph-arrow-right" style="font-size:16px; opacity:0.8;"></i>';
            }
        });

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
            setTimeout(() => {
                errorMsg.classList.add('hidden');
            }, 3000);
        }
    </script>
</body>
</html>
